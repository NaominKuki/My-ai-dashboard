<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tools Dashboard</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

h1{
color:#38bdf8;
}

.container{
max-width:900px;
margin:auto;
}

.tool{
background:#1e293b;
padding:20px;
margin:15px;
border-radius:10px;
}

textarea,input{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}
</style>
</head>

<body>

<h1>AI Tools Builder 🚀</h1>

<div class="container">

<div class="tool">
<h2>📱 APK Builder</h2>
<input id="appname" placeholder="Enter app name">
<textarea id="appdesc" placeholder="Describe the Android app"></textarea>
<button onclick="generateAPK()">Generate App Code</button>
<p id="apkresult"></p>
</div>

<div class="tool">
<h2>🤖 Telegram Bot Builder</h2>
<input id="botname" placeholder="Bot name">
<input id="bottoken" placeholder="Bot token">
<button onclick="generateBot()">Generate Bot Code</button>
<p id="botresult"></p>
</div>

<div class="tool">
<h2>🎬 Word → Video Generator</h2>
<textarea id="videotext" placeholder="Write story or text"></textarea>
<button onclick="generateVideo()">Create Video Script</button>
<p id="videoresult"></p>
</div>

</div>

<script>

function generateAPK(){
let name=document.getElementById("appname").value
let desc=document.getElementById("appdesc").value

document.getElementById("apkresult").innerText=
"Generated Android app idea:\nApp Name: "+name+"\nDescription: "+desc+"\nFiles: MainActivity.java, activity_main.xml"
}

function generateBot(){
let name=document.getElementById("botname").value

document.getElementById("botresult").innerText=
"Telegram Bot '"+name+"' code template generated."
}

function generateVideo(){
let text=document.getElementById("videotext").value

document.getElementById("videoresult").innerText=
"Video script created from your text:\n"+text
}

</script>

</body>
</html>
